spring:
  main:
    allow-bean-definition-overriding: true
  jpa:
    open-in-view: false

datasource:
  profile:
    xa-class: org.h2.jdbcx.JdbcDataSource
    url: jdbc:h2:mem:profile;DB_CLOSE_DELAY=-1;MODE=MySQL
  contact:
    xa-class: org.h2.jdbcx.JdbcDataSource
    url: jdbc:h2:mem:contact;DB_CLOSE_DELAY=-1;MODE=MySQL
  user: sa
  password: ""

logging:
  level:
    com.atomikos: TRACE
    org.hibernate.SQL: DEBUG
    org.springframework.transaction: DEBUG
